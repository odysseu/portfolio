<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hugo Jarkoff - CV Download</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            padding: 30px;
            text-align: center;
            max-width: 800px;
            width: 100%;
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
        }
        .cv-options {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .cv-option {
            cursor: pointer;
            transition: transform 0.2s;
            text-align: center;
        }
        .cv-option:hover {
            transform: scale(1.05);
        }
        .cv-option img {
            width: 200px;
            height: 280px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            object-fit: contain;
            background-color: white;
        }
        .cv-option p {
            margin-top: 10px;
            font-weight: bold;
            color: #555;
        }
        .note {
            margin-top: 30px;
            color: #777;
            font-size: 14px;
        }
        @media (max-width: 600px) {
            .cv-options {
                flex-direction: column;
                gap: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Download My CV</h1>
        <div class="cv-options">
            <div class="cv-option" onclick="downloadCV('english')">
                <img src="english_cv_preview.png" alt="English CV Preview">
                <p>English Version</p>
            </div>
            <div class="cv-option" onclick="downloadCV('french')">
                <img src="french_cv_preview.png" alt="French CV Preview">
                <p>French Version</p>
            </div>
        </div>
        <div class="note">
            <p>Click on the preview images above to download the respective CV version.</p>
        </div>
    </div>
    
    <script>
        function downloadCV(language) {
            const link = document.createElement('a');
            
            if (language === 'english') {
                link.href = 'cv.pdf';
                link.download = 'Hugo_Jarkoff_CV_English.pdf';
            } else {
                link.href = 'cv_french.pdf';
                link.download = 'Hugo_Jarkoff_CV_French.pdf';
            }
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
