<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Download Ulysse Boucherie's CV in English or French. Professional profile and resume.">
    <title>Ulysse Boucherie | Download CV</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://odysseu.github.io/">
    <meta property="og:title" content="Ulysse Boucherie | Download CV">
    <meta property="og:description" content="Download Ulysse Boucherie's CV in English or French. Professional profile and resume.">
    <meta property="og:image" content="https://odysseu.github.io/images/circle_profile.png">

    <!-- Twitter Card (sans compte Twitter) -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Ulysse Boucherie | Download CV">
    <meta name="twitter:description" content="Download Ulysse Boucherie's CV in English or French. Professional profile and resume.">
    <meta name="twitter:image" content="https://odysseu.github.io/images/circle_profile.png">

    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            padding: 30px 0;
            text-align: center;
            max-width: 800px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
        }
        .cv-options {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .cv-option {
            cursor: pointer;
            transition: transform 0.2s;
            text-align: center;
        }
        .cv-option:hover {
            transform: scale(1.05);
        }
        .cv-option img {
            width: 200px;
            height: 280px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            object-fit: contain;
            background-color: white;
        }
        .cv-option p {
            margin-top: 10px;
            font-weight: bold;
            color: #555;
        }
        .note {
            margin-top: 30px;
            color: #777;
            font-size: 14px;
        }
        .profile-picture {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            border: 3px solid #fff;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        @media (max-width: 600px) {
            .cv-options {
                flex-direction: row;
                gap: 10px;
            }
            .cv-option img {
                width: 120px;
                height: 170px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="circle_profile.png" alt="Profile Picture of Ulysse Boucherie" class="profile-picture">
        <h1>Download My CV</h1>
        <div class="cv-options">
            <div class="cv-option" onclick="downloadCV('english')">
                <img src="english_cv_preview.png" alt="Preview of English CV">
                <p>English Version</p>
            </div>
            <div class="cv-option" onclick="downloadCV('french')">
                <img src="french_cv_preview.png" alt="Preview of French CV">
                <p>French Version</p>
            </div>
        </div>
        <div class="note">
            <p>Click on the preview images above to download the respective CV version in .pdf</p>
        </div>
    </div>

    <script>
        function downloadCV(language) {
            const link = document.createElement('a');

            if (language === 'english') {
                link.href = 'cv_english.pdf';
                link.download = 'Ulysse_Boucherie_CV_English.pdf';
            } else {
                link.href = 'cv_french.pdf';
                link.download = 'Ulysse_Boucherie_CV_French.pdf';
            }

            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
